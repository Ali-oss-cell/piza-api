# Production stack: Traefik + PostgreSQL + API + Next.js frontend (Droplet).
#
# Layout on the droplet:
#   ~/piza/piza-api/     ← this repo (run compose from here)
#   ~/piza/piza-front/   ← sibling clone (FRONTEND_DIR)
#
#   cp .env.production.example .env
#   # edit .env — POSTGRES_PASSWORD, JWT_SECRET, ACME_EMAIL, etc.
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  traefik:
    image: traefik:v3.6.2
    container_name: piza-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=piza
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - piza

  postgres:
    image: postgres:16-alpine
    container_name: piza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-marinapizzas}
      POSTGRES_USER: ${POSTGRES_USER:-piza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - piza

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: piza-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-piza}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-marinapizzas}?schema=public
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-false}
    labels:
      - traefik.enable=true
      - traefik.docker.network=piza
      - traefik.http.routers.piza-api.rule=Host(`${API_DOMAIN:-api.marinapizzas.com.au}`)
      - traefik.http.routers.piza-api.entrypoints=websecure
      - traefik.http.routers.piza-api.tls.certresolver=letsencrypt
      - traefik.http.routers.piza-api.service=piza-api
      - traefik.http.services.piza-api.loadbalancer.server.port=3001
    networks:
      - piza

  web:
    build:
      context: ${FRONTEND_DIR}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: piza-front
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    labels:
      - traefik.enable=true
      - traefik.docker.network=piza
      - traefik.http.routers.piza-web.rule=Host(`${WEB_DOMAIN:-marinapizzas.com.au}`) || Host(`${WEB_WWW_DOMAIN:-www.marinapizzas.com.au}`)
      - traefik.http.routers.piza-web.entrypoints=websecure
      - traefik.http.routers.piza-web.tls.certresolver=letsencrypt
      - traefik.http.routers.piza-web.service=piza-web
      - traefik.http.services.piza-web.loadbalancer.server.port=3000
    networks:
      - piza

  pos:
    build:
      context: ${POS_DIR:-../piza-pos}
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_POS_API_URL:-${NEXT_PUBLIC_API_URL}}
    container_name: piza-pos
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
    labels:
      - traefik.enable=true
      - traefik.docker.network=piza
      - traefik.http.routers.piza-pos.rule=Host(`${POS_DOMAIN:-pos.marinapizzas.com.au}`)
      - traefik.http.routers.piza-pos.entrypoints=websecure
      - traefik.http.routers.piza-pos.tls.certresolver=letsencrypt
      - traefik.http.routers.piza-pos.service=piza-pos
      - traefik.http.services.piza-pos.loadbalancer.server.port=3002
    networks:
      - piza

networks:
  piza:
    name: piza

volumes:
  traefik_letsencrypt:
  postgres_data:
