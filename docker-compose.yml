services:
  postgres:
    image: postgres:16-alpine
    container_name: leovorno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leovorno
      POSTGRES_USER: leovorno
      POSTGRES_PASSWORD: leovorno_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leovorno -d leovorno']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leovorno-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: api
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql://leovorno:leovorno_secret@postgres:5432/leovorno?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret-min-32-chars}
      JWT_EXPIRES_IN: 1d
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@leovorno.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-ChangeMe!2026}
      ADMIN_SEED_FIRST_NAME: ${ADMIN_SEED_FIRST_NAME:-Leovorno}
      ADMIN_SEED_LAST_NAME: ${ADMIN_SEED_LAST_NAME:-Admin}
      RUN_MIGRATIONS: 'true'
      RUN_SEED: 'true'
    ports:
      - '3001:3001'

volumes:
  postgres_data:
